# 监听 80 + 443（如果挂了证书的话）
# 没挂证书时，443 块不会生效（include /etc/nginx/ssl-on.conf 文件不存在）
# 挂了证书后由 docker-compose.tls.yml 注入 ssl-on.conf

map $host $cloudhelper_https {
    default off;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # 静态文件
    root /usr/share/nginx/html;
    index index.html;

    # 强制 HTTPS 跳转（启用 TLS overlay 时由 ssl-on.conf 覆盖此行为）
    include /etc/nginx/conf.d/_https_redirect.conf;

    # 前端 SPA 路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反代到后端
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        # location 级 add_header 会覆盖 server 级，需在此重复声明安全头
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
}

# HTTPS server 块由 ssl-on.conf 注入（如果挂了证书）
include /etc/nginx/conf.d/_ssl_server.conf;
