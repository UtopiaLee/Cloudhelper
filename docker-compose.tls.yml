# 手动证书 overlay：用户自带证书文件
#
# 用法：
#   1. .env 设置:
#        TLS_CERT_PATH=/etc/letsencrypt/live/example.com/fullchain.pem
#        TLS_KEY_PATH=/etc/letsencrypt/live/example.com/privkey.pem
#      （也可以是 Cloudflare Origin Cert / 自签证书的路径）
#
#   2. 启动:
#        docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d --build
#
# 容器会同时监听 80 (跳转到 443) 和 443 (TLS)。

services:
  frontend:
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      # 用户证书文件只读挂入容器
      - ${TLS_CERT_PATH:?TLS_CERT_PATH 必填}:/etc/nginx/ssl/cert.pem:ro
      - ${TLS_KEY_PATH:?TLS_KEY_PATH 必填}:/etc/nginx/ssl/key.pem:ro
      # 覆盖默认 include 文件，开启 443 server + HTTP→HTTPS 跳转
      - ./frontend/nginx/_https_redirect.tls.conf:/etc/nginx/conf.d/_https_redirect.conf:ro
      - ./frontend/nginx/_ssl_server.tls.conf:/etc/nginx/conf.d/_ssl_server.conf:ro
