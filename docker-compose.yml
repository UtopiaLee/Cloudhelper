services:
  backend:
    build:
      context: ./backend
    image: cloudhelper-backend:latest
    container_name: cloudhelper-backend
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    # entrypoint 以 root 修正 /data 属主再用 gosu 降权，需要以下最小权限：
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/cloudhelper.db
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health?probe=1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    expose:
      - "8000"
    # 只对内网暴露；对外通过 frontend 的 nginx 代理
    networks:
      - cloudhelper

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    image: cloudhelper-frontend:latest
    container_name: cloudhelper-frontend
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    # nginx master 以 root 起、worker 降到 nginx 用户并绑定 80，需要以下最小权限：
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
      - DAC_OVERRIDE
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # 默认只绑定本机回环：明文 HTTP，不对外网发布。
      # 对外请用 docker-compose.https.yml (Caddy 自动 TLS) 或
      # docker-compose.tls.yml (自带证书) overlay，走真正的 HTTPS。
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-8080}:80"
    networks:
      - cloudhelper

networks:
  cloudhelper:
    driver: bridge
